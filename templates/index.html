<div class="container">
    <h1>🛡️ ShieldStream</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('sender')">Broadcaster</button>
        <button class="tab-btn" onclick="showTab('receiver')">Receiver Node</button>
        <button class="tab-btn" onclick="showTab('scanner')">AI Scanner</button>
    </div>

    <section id="sender" class="tab-content active card">
        <h2>Broadcaster (Sender)</h2>
        <div id="drop-zone" class="drop-zone">
            <span>Drag & Drop Match Video</span>
            <input type="file" id="videoInput" hidden>
        </div>
        <button onclick="handleUpload()" class="btn-primary">Encrypt & Send</button>
        <div id="senderLoader" class="loader"></div>
        <p id="senderMsg"></p>
    </section>

    <section id="receiver" class="tab-content card">
        <h2>Receiver Master Aggregator</h2>
        <button onclick="handleReceive()" class="btn-primary" style="background:#10b981;">Receive & Decrypt Stream</button>
        <p id="receiveStat" style="margin:10px 0; color:#10b981;"></p>
        
        <div class="video-container">
            <video id="mainPlayer" controls width="100%" style="border-radius:10px; background:#000;">
                <source src="/stream_video" type="video/mp4">
            </video>
        </div>
    </section>

    <section id="scanner" class="tab-content card">
        <h2>🕵️ AI Anti-Piracy Scanner</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="susLink" placeholder="Enter suspicious link..." style="flex:1;">
            <button onclick="scanLink()" class="btn-primary" style="width:80px;">Scan</button>
        </div>
        <tbody id="pirateTable"></tbody>
    </section>
</div>
